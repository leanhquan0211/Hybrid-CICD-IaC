---
- name: Template Nginx config
  template:
    src: nginx.conf.j2
    dest: /tmp/nginx_lb.conf
  notify: restart loadbalancer

- name: Ensure LoadBalancer container running with custom config
  docker_container:
    name: load_balancer
    image: nginx:alpine
    state: started
    restart_policy: always
    ports:
      - "80:80"
    volumes:
      - /tmp/nginx_lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - name: cicd_network