---
- name: Template Nginx config
  template:
    src: nginx.conf.j2
    dest: /workspace/nginx_lb.conf   # Ghi vào thư mục được mount giữa host & runner
  notify: restart loadbalancer

- name: Ensure LoadBalancer container running with custom config
  docker_container:
    name: load_balancer
    image: nginx:alpine
    state: started
    restart_policy: always
    ports:
      - "80:80"
    volumes:
      # Đường dẫn host thật (WSL) đến file config, thay 'leanhquan' nếu WSL username khác
      - /home/leanhquan/hybrid-cicd-iac/nginx_lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - name: cicd_network